name: Next.js CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # FORCE COREPACK BEFORE ANY YARN CALL
      - name: Enable Corepack + remove Yarn 1 conflict
        run: |
          corepack enable
          corepack prepare yarn@3.6.4 --activate
          which yarn
          yarn -v

      # IMPORTANT: DO NOT rely on "yarn"
      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Lint
        run: corepack yarn lint

      - name: Type check
        run: corepack yarn type-check

      - name: Test
        run: corepack yarn test --passWithNoTests

      - name: Build
        run: corepack yarn build