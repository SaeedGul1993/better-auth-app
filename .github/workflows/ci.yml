name: Next.js CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # 🔥 THIS MUST COME IMMEDIATELY AFTER NODE SETUP
      - name: Enable Corepack
        run: corepack enable

      - name: Force Yarn 3.6.4
        run: corepack prepare yarn@3.6.4 --activate

      # optional but helps debug CI issues
      - name: Verify Yarn Version
        run: yarn -v

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Type Check
        run: yarn type-check

      - name: Test
        run: yarn test --passWithNoTests

      - name: Build
        run: yarn build